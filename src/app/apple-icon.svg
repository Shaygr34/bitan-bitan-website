<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Gold circle -->
  <circle cx="90" cy="90" r="90" fill="#C5A572"/>
  <!-- Abacus rods (4 horizontal lines) -->
  <line x1="28" y1="48" x2="152" y2="48" stroke="#102040" stroke-width="4.5"/>
  <line x1="28" y1="76" x2="152" y2="76" stroke="#102040" stroke-width="4.5"/>
  <line x1="28" y1="104" x2="152" y2="104" stroke="#102040" stroke-width="4.5"/>
  <line x1="28" y1="132" x2="152" y2="132" stroke="#102040" stroke-width="4.5"/>
  <!-- Row 1: 3 beads right-aligned -->
  <circle cx="84" cy="48" r="11" fill="#102040"/>
  <circle cx="112" cy="48" r="11" fill="#102040"/>
  <circle cx="140" cy="48" r="11" fill="#102040"/>
  <!-- Row 2: 4 beads spread -->
  <circle cx="44" cy="76" r="11" fill="#102040"/>
  <circle cx="72" cy="76" r="11" fill="#102040"/>
  <circle cx="100" cy="76" r="11" fill="#102040"/>
  <circle cx="128" cy="76" r="11" fill="#102040"/>
  <!-- Row 3: 3 beads left-aligned -->
  <circle cx="44" cy="104" r="11" fill="#102040"/>
  <circle cx="72" cy="104" r="11" fill="#102040"/>
  <circle cx="100" cy="104" r="11" fill="#102040"/>
  <!-- Row 4: 4 beads spread -->
  <circle cx="44" cy="132" r="11" fill="#102040"/>
  <circle cx="72" cy="132" r="11" fill="#102040"/>
  <circle cx="100" cy="132" r="11" fill="#102040"/>
  <circle cx="128" cy="132" r="11" fill="#102040"/>
</svg>
