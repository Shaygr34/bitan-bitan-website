<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gold circle -->
  <circle cx="16" cy="16" r="16" fill="#C5A572"/>
  <!-- Abacus rods (4 horizontal lines) -->
  <line x1="5" y1="8.5" x2="27" y2="8.5" stroke="#102040" stroke-width="1"/>
  <line x1="5" y1="13.5" x2="27" y2="13.5" stroke="#102040" stroke-width="1"/>
  <line x1="5" y1="18.5" x2="27" y2="18.5" stroke="#102040" stroke-width="1"/>
  <line x1="5" y1="23.5" x2="27" y2="23.5" stroke="#102040" stroke-width="1"/>
  <!-- Row 1: 3 beads right-aligned -->
  <circle cx="15" cy="8.5" r="2" fill="#102040"/>
  <circle cx="20" cy="8.5" r="2" fill="#102040"/>
  <circle cx="25" cy="8.5" r="2" fill="#102040"/>
  <!-- Row 2: 4 beads spread -->
  <circle cx="8" cy="13.5" r="2" fill="#102040"/>
  <circle cx="13" cy="13.5" r="2" fill="#102040"/>
  <circle cx="18" cy="13.5" r="2" fill="#102040"/>
  <circle cx="23" cy="13.5" r="2" fill="#102040"/>
  <!-- Row 3: 3 beads left-aligned -->
  <circle cx="8" cy="18.5" r="2" fill="#102040"/>
  <circle cx="13" cy="18.5" r="2" fill="#102040"/>
  <circle cx="18" cy="18.5" r="2" fill="#102040"/>
  <!-- Row 4: 4 beads spread -->
  <circle cx="8" cy="23.5" r="2" fill="#102040"/>
  <circle cx="13" cy="23.5" r="2" fill="#102040"/>
  <circle cx="18" cy="23.5" r="2" fill="#102040"/>
  <circle cx="23" cy="23.5" r="2" fill="#102040"/>
</svg>
