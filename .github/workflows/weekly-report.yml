name: Weekly Performance Report

on:
  schedule:
    # Every Sunday at 06:00 UTC (09:00 Israel time)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/weekly-report/requirements.txt

      - name: Generate and send report
        working-directory: scripts/weekly-report
        env:
          GA4_CREDENTIALS_B64: ${{ secrets.GA4_CREDENTIALS_B64 }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: python main.py
